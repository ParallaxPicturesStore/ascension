name: Mobile Release (EAS)

# NOTE: Both apps/mobile and apps/ally need Expo project init (eas init)
# before this workflow will succeed. Run `eas init` in each directory first.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mobile:
    name: Build Mobile App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: apps/mobile

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build with EAS
        run: eas build --platform all --non-interactive
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build-ally:
    name: Build Ally App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: apps/ally

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build with EAS
        run: eas build --platform all --non-interactive
        working-directory: apps/ally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
